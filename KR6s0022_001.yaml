羅布娑黃瓜俱夜羅瓜嚩羅呵楮舍也紙摩史墨迦攞引麼筆里佉書哦拏多算曀迦一馱婆野二多羅也三者都羅四半者五娑智六娑波多七阿瑟吒二合八那嚩九馱舍十尾舍二十嘻林舍三十左多婆羅舍四十半左引舍五十娑瑟知舍六十娑波多七十阿捨底八十那婆底九十設多百娑賀娑羅千那逾多萬攞乞叉億俱智兆陀尼梵富俱里那貴賤娜哩捺羅二合引貧嚩睺多娑多迦少陳囉伽長􅁤呵羅莎婆短索乃兒布多羅子訥呬女􅝩婆里也妻鉢底妾羅惹王鉢羅拏野迦臣吒俱羅宮波里瞿米阿吒迦抳麵伊陀那柴阿哦羅炭􅋌婆娑摩灰阿疑儞二合火帶攞油伽哩二合多酥摩乞叉迦蜜戍拏吒二合薑覽哦橘疑多歌那里底也舞吠里鼓萬舍笛尾那箜篌索伽沙迦笙嚩怒儞也學問阿夜娑辛特佉苦怒引羅遠娑弭近憂迦嚕拏悲嚕馱那哭呵娑也二合笑嚩左那語阿尾哦摩那迎阿耨婆羅惹那送萬馱那拜曩摩索迦羅跪阿去矩盧舍罵波里婆引沙拏辱弟沙瞋嚕沙喜阿含我多梵都儞􅁤娑嚩二合車清􅞻迦羅沙濁儼毗羅深攞馱淺鉢囉二合引波多二合得失􅝩慳攞婆貪嫉阿畢儞也妬尾乞叉乞夜引左索波禮乞者求覓婆野恐車美多怖􅖱摩羅哦道俱舍攞善􅁤薩嚩二合囉音攝那聲惹抳擔知那仰抳多不知涅哩二合瑟吒二合見捺波舍也二合引弭不見弊里惹引呬識那尾惹那多不識輸嚕二合多聞曩輸嚕二合多不聞尾冒馱覺那尾沒馱不覺昧娜也酒麼引上誐肉摩拏餅舍引迦菜伊瑟吒愛阿畢里二合耶憎嫌弗多羅子苞多羅孫阿吉里也喚鉢羅拏客􅁤莎嚩二合弭主摩里也馱禮􅚼曷羅他二合義舍羅馱信捨闌多困𩕳半多羅請波羅二合婆舍明暗吐迦引囉暗迦知腰惹引拏膝相矩摩行底瑟吒二合住澡多臥佉吒床多攞四席捺婆娜氈尾跢那毾靴補攞鞋末寫弭引那魚播乞叉熟部乞叉飢弊波多飽末多乞叉縛醉娜史引吒坐鬱底上瑟吒起陀縛走銘伽雲􅁒室制多白訖里史拏黑𩕳引攞青路引呬上多赤乳耄囉紫波攞引捨緑鬱嚩上阿嚩多羅下孫鄰胡振那漢􅊶羅濕弭二合光俱多也牆􅝩鉢里也拏院播波罪阿跛囉引陀過布拏也二合福瞿拏德烏跢摩勝呬那劣㖏哩二合荼堅娑引囉固素跢羅經毗那野律跛栗他婆惹那凡􅝩阿引哩也二合聖曀鑁是非鉢羅抳地願阿哦車來哦車去􅝑襪嚩蘇佉消息率都沙歡樂恨布囉拏滿梵唐消息終件書以元慶八年正月二十三日始經四日寫惟海上人之本訖焉三井寺唐院比丘良勇記
