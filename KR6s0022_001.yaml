body:
  text: 三藏法師義淨撰為欲向西國人作學語樣仍各注中梵音下題漢字其無字者以音正之並是當途要字但學得此則餘語皆通不同者舊千字文若兼悉曇章讀梵本一兩年間即堪翻譯矣梵語千字文舊刻序附凡例五則錦囊玉函曾藏寶冊矣梵語千字文斯其目也曩哲傳言義淨三藏之所撰也然舊籍之中援文才存全書久隱昔在東武偶摸一本而出敗笥蠧簡之餘未能全矣頃年遊洛幸得衆本禪餘考訂粗復正策敻博達梵國之異聞大洗蕩聖經之滯疑襲重祕惜獨展眉矣顧其撰者之訓人泛愛之所及而吾焉廋哉於是強翻函囊從事雕鏤云時享保丁未之春建寅之望瑜伽乘沙門寂明書於洛東僑居凡例一此書一名梵唐千字文安然録載云慈覺大師之請來今探數本參互考定而未無謬也披覽君子幸得好本再質正之一梵唐對儷音韻賒切或不得正考之衆本而無可據則置而不改縱有經軌明文而不據彼削此其意可知耳一諸本有異遽難決者間點示之揭之冠首又傍附國字力惠幼學耳一和州法隆寺藏中天貝葉二片般若心經及尊勝陀羅尼也末出悉曇十四音今此中梵字形容彼貝葉而與當世書家之蹟互濫難辨隨世焉耳如彼貝葉齒音第二作形脣音第二作形者忽示難範故不取之如舌音第二作喉音第二作第四作及摩多中第四點作第七作別摩多作者雖異例無濫自餘少異披而可見焉一今此書也四字成句一齊押韻而數寫數誤文字出沒布置錯亂校之數帙而無可序矧其以唐對梵何詳其趣縱使興嗣次韻豈能併訂二國之語意乎梵語千字文譯注天地日月陰陽圓矩晝夜明暗雷電風雨星流雲散來往去取東西南北上下相輔皇臣僕吏貴賤童竪刊定品物策立州主辨教禮書置設衛府父母兄弟孝義弘撫甥舅異鄰伯叔同聚奉事友明矜愛貧窶山庭蔽軒蓋淨野標華柱美素竟千秋嘉聲傳萬古已上麌姥男女迎嫁喚命招追賣買出入俗務交馳市店商貨妍醜強羸先蒙少贈今酬重遺一聞砥礪再想針規謹身節儉離此而誰終希惡滅恆敦福綏禍如響應善若影隨圖名璀璨積行葳蕤汝欽睿哲猶囊裏錐咸京遵碩德龜洛啓神師既能歡夕殞何得苦朝飢已上支脂講道論妙激揚理致文參疊席聰過𨵃肆玉砌推賢石渠讓次撿驗是非提撕愚智紙落浮花詩成含翠筆不停毫句寧易字意存忠直弗尚邪媚獨暢幽情偏抽雅思片淑求仁君子匪器才伎勿嫌固難周備七步沈辭遠三略玄英祕銓衡信立人誠哉未淪墜已上置至兵戎偃戟武帝騰輝通衢走驛結陌縈旗九江躍羽四海呈威銅梁截險劍閣要機好謀宣敗臨敵慮微勝懷大懼雖劣莫欺魚麗隻進鶴翼雙飛赤心罔詐黃泉指期元首欣效賞職靡疑股肱竭操佐弼乾基送使祇連伏旋旌宿慎歸息靜肩胸裏戰遂肥已上微飲食飯菜鹽酢羹餅果喜團糖蔗噉嚼薑椒胡椒芥白芥芋煮熟斟酌恭敬持與盤盂屏却踞坐小床返繫衣角餐罷遷位齒木梳濯牛糞塗拭洗滌匙杓倉庫厨廳儲安釜鑊刀鎌𤬪瓮斧箕繩索違拒敕條官司執縛養身知患本遂靜棲林薄專崇社多志急遣斯封著已上藥鐸春耕種植畎畝營農決池降澤犁耮施功懶夫晨寐勤士宵興鞭杖車輿驢馱馬乘排槊弓箭逆順分崩稻麻豆麥課役年徵籌量斛數計算斗升絹布肘度雇價依憑絲縷箱筐針綖裁縫街吟巷吼瞋笑吉凶絶嶺新芝碧危巒舊蘂紅解帶宜攀折共鄙田家翁已上東給園仙樹鹿苑王城薜舍梨國劫比羅營回顧戀別報望恩生雞峯隱骨龍穴潛形禪河水濬戒巘巖清俯悲塵界猶式遮聽慈幡永振慧炬長熒扶關六趣開圍十冥祛除虐毒軫忍黔靈嚴儀像殿寫勘尊經佛法處僧念罪輕位幸當修軌轍畢至涅槃城已上康耕袈裟衣瓶鉢臥具衣裳厚被盛匱單裙袋藏蟲鼠恐齧浣曬舒張氍毹綾錦繡褥芳簷宇蕭灑緩掉鏗鏘有恥艾臭無嫌麝香讚詠歌管博奕酒醫梵音彈舌悉曇莫忘願茲利潤總洽無疆且題八百餘皆審詳早須習奇說始可向他鄉聊申學語樣豈欲耽文章已上陽唐初因業報託形母胎無明種子造作根栽識聚因起名色相依六處既剖觸支復推受愛貪境取有斯開見生雖喜老死還哀憂悲始去苦惱終來如輪環之轉若箭之催善居天苑惡處煻煨明可信浩寧猜四生頻落泊六趣幾徘徊眷言明智者事可傷哉已上灰胎頭目耳鼻脣口牙咽額項毛髮舌卷胸懸喉缺肩甲臂腕相連筋脈瘡疥指節纖駢腰背乳助腎勾牽臍面脅腸肚一邊屎尿充塞臗𦜮𭣿偏皮肉骨髓膿血周緣髀腿膝脛腂腡胼手足頑痺恆流唾涎嗚呼臭穢體奇哉人並憐請知生有過莫向死王前已上先仙唐字千鬘聖語竟梵語千字文譯注千文一書題曰義淨撰識者非無疑蓋依全真唐梵文字而製之託名淨師者也然有益于初學既已不少僞也真也何亦須言故更附譯注云爾安永癸巳初冬望日沙彌敬光書􅁤􅖱娑嚩二合羅誐二合天跛𨁫二合體他以反尾地􅝩素引哩也二合日戰達羅二合月縒引也引陰阿引多上博陽波哩波吒圓阿奈舍矩儞寧以反嚩索晝囉引底哩二合夜阿引路腳明阿怛迦洛暗􅗭禰嚩蘖惹底丁以反雷尾儞庾二合電嚩庾風􅞻縛囉沙二合雨哆引囉迦星素路二合多流謎伽雲尾娜儞跢散野底丁以反往阿伊舍來誐哆去攞伊上誐里二合訶娜二合取布羅嚩二合東􅁒波室制二合摩西諾乞叉二合拏南烏多重囉北塢跛羅上係瑟姹重下􅋌跛羅娑摩二合羅相鉢羅二合底嚩馱輔禰嚩補怛羅二合皇摩底哩二合臣娜引娑僕儞寧以反尾囉吏摩曷伽貴娑末羅伽賤俱摩囉童嚩攞多嚩竪儞野多刊扇引多定跛哩嚩羅跢品捺羅二合尾也二合物阿毗世迦策悉體二合多立摩訶曩誐羅州􅁥娑縛二合弭主􅁤娑羅娑縛二合底丁以反辨式乞叉左上教儞引底丁以反禮隸佉入書􅁥娑嚩二合引比多入置烏嚕設娑泮引衙儞誐莫府比哆引父摩哆引母臡瑟姹二合勃羅二合多兄迦儞也二合娑引勃羅二合引多弟戍迦孝􅚼遏他義物哩二合訶多半音弘鉢羅二合娑引娜撫婆引擬寧也甥娑引攞舅跛哩二合詫迦半音異跛哩弟史鄰臡準上瑟姹二合怛羅比伯比怛哩二合也叔曀迦娑他上引同謎攞聚鉢羅二合拏上摩奉迦引囉事弭音泯怛羅友博乞灑二合入朋迦嚕拏矜必哩二合也愛娜哩捺羅二合引貧阿捺羅二合弭也二合窶鉢縛多山盎上誐娜庭曼拏囉引蔽烏縒囉二合引比多軒㻮怛囉二合蓋輸上止淨阿咜上味野止即以反賀曩二合引標補澀波二合華娑擔二合婆入重呼柱摩哩二合瑟咤二合美濕吠二合多素娑摩引波多竟娑訶上娑羅二合千捨囉姹塢秋俱舍羅嘉攝婆娜二合聲散左引囉傳鉢羅陛娜萬補囉引拏古補嚕灑男悉怛哩三合引女鉢羅二合底也二合誐摩曩迎尾縛賀上嫁郝迦引囉喚爾引尾擔命儞引弭多重招􅞻阿引羯羅灑追尾訖利二合拏賣訖哩二合拏買儞迦重攞出鉢羅二合尾捨入疙哩二合呬俗迦囉理引也務三弭也二合羅賀上囉交惹自羅反嚩馳賀上吒重市鉢羅二合娑引羅店縛抳惹準上商尾訖哩二合攞引貨鉢羅二合娑引儞寧以反迦妍訥縛無撥反拏重醜摩攞縛虎重強訥摩攞羸布引羅嚩二合先鉢羅二合娑引娜蒙窣妬二合迦少普縛儞贈阿儞也二合今鉢囉二合底布引惹酬虞嚕重護縛抳遺曀迦上一戍嚕二合多上聞始攞引砥勢引攞礪補曩上再僧惹拏二合引想􅟓孽賀上拏針儞上底規虞魚嬌反囉嚩謹設利引囉身鉢嚩二合重節訥避乞灑二合引儉尾誐多離伊上賀此阿上多而句誰儞瑟𡛥二合終嚩囉希尾嚕引跛惡儞儞逸反嚩吒二合拏滅薩嚩迦引攞恆虞嚕室囉馱引敦本寧也福蘇悉體二合多綏庇拏引禍也他引如鉢囉二合底他以反攝娜響鉢羅二合底庾二合多羅應俱捨攞善也儞寧以反若捨引也引影阿耨鉢室者二合都隨質怛羅二合羯磨圖曩引摩名穆怛羅二合勢羅璀璨俱引姹上積僧娑迦二合引羅行虞拏惹葳􅛔設馱羅蕤怛縛二合夜引汝虞嚕欽尾諾重睿鉢羅二合惹拏二合引哲也他引猶虞惹引囊弟膩多裏阿引囉錐也竪止咸摩訶京虞魚嬌反羅嚩遵始攞碩虞拏德迦縒跛龜娑囉誐洛烏娜伽二合吒啓禰嚩多神舍娑多二合師也儞寧以反既舍枳也二合能都瑟吒二合歡羅怛哩二合怛囉二合夕摩囉二合多殞迦多摩何跛羅二合跛多二合得耨佉上苦鉢羅二合底庾二合灑朝僕乞灑二合引飢弭也二合企也二合南講跛多上道設娑怛羅三合論曼儒左塢反妙阿引娑怖二合吒激儞喻二合引多揚弭也二合縛賀引囉理􅚼閼他致惡乞灑二合囉文阿娑頗二合引以參烏補羅引跛羅疊多攞絲早以反席鉢羅二合惹拏二合聰阿底乞蘭二合引怛羅二合引過涅哩二合瑟置二合閲左怛縛二合曷吒肆母娑引囉玉囉左上曩砌比㘑囉推跋捺羅二合賢娜乞史二合拏石嚩引賀上渠􅝩播誐那乞使二合里也讓阿曩底紇羅二合摩次尾左引囉撿鉢羅二合底也二合乞灑驗護引底丁以反是阿儞也二合鼻他引非鉢羅二合尾左也提娑摩撕􅖥母引囉佉二合愚惹拏二合引曩智迦引迦哩紙跛底多落跛羅二合嚩浮補澀跛二合花戍路二合迦上迦尾也二合詩儞澀半二合曩成摩哩也二合引娜引含素上囉引誐翠迦攞引摩筆阿曩不阿縒上停􅓊􅚤路摩曩二合嗢囉拏二合毫跛娜句儞嚕鉢捺羅二合縛寧跛哩襪多重易惡乞灑二合羅字阿鼻鉢羅二合引也意僧上計多存哩儒而祖反忠娑頗羅三合瑟吒二合直摩鉢羅二合底灑上馱弗阿比尚弭上體也二合引邪布路二合娑引儞寧以反迦媚計縛攞獨鉢羅二合尾吠迦暢儼毗引羅幽薩怛嚩二合情阿縛曩多偏􅞻阿引羯羅灑抽􅓺鉢羅二合始儞二合迦雅振多思釰塢片􅚼沙囉他曩淑鉢羅也引曩求惹曩仁􅁥娑嚩二合引弭君補怛羅子摩匪婆引惹曩器婆引誐才尾惹拏二合曩伎麼迦羅引勿儒虞波娑二合引嫌􅖥朅佉吒上固訥娑迦二合囉難娑曼多周三半曩備颯多七訖羅二合摩步􅍉儞摩誐曩二合沈嚩迦半音辭怒引囉遠怛哩二合抳三僧乞差二合跛略努羅嚩冒馱玄迷馱引尾英虞呬也二合祕烏止多銓覩理也二合衡室羅二合馱引信悉體二合多立惹曩摩努灑也二合人阿毗鉢羅二合散曩誠迦瑟吒二合哉曩多引縛覩未娑羅二合縛底淪跛底多墜迦馱嚩二合縛引囉兵阿庾馱設娑多羅三合戎細覩偃戍引攞戟喻馱武乞剎二合怛哩二合也帝阿部娜誐二合多騰儞喻二合底輝哩地通囉他也二合衢馱引縛走娑他二合引曩舍攞引驛仡羅二合蹉結乞芻二合儞嚩無撥反摩陌跛哩弟瑟吒二合縈馱嚩二合惹旗曩縛九摩訶曩儞也二合江郝乞灑二合躍博乞叉羽左怛嚩二合引羅四三母捺羅二合海捺羅捨二合也呈帝惹南引威擔引摩囉二合銅仡哩二合賀納誐梁質怛哩二合截鉢羅二合播多險􅖱朅伽劍馱縛攞伽上囉閣鉢羅二合喻惹曩要􅃝縛引仰弭二合引機婆上攞重好阿嚩娑建二合娜謀尾馱味宣尾曩捨敗阿哆重臨馱怛娜嚩敵迦娜引止覩慮跛囉摩微惹也勝􅗭建惹懷摩訶大婆上也懼娜娜引弭雖􅁤娑縛二合攞跛劣摩莫跛里婆上縛欺末寫重魚􅕷尾怛迦麗計縛攞隻訖羅二合摩進句路二合惹泄二合鶴發虞曩博乞叉二合翼庾誐攞雙烏拏也底飛路枳多赤質多心惹引攞罔迦縛吒詐庇多覽黃嗢陛娜泉盎上虞澀指鉢羅二合底曳二合迦期阿引儞儞以反元鉢羅二合他摩首覩瑟吒二合欣嗢縒引賀上效娜引也賞娑他二合引難職頞耨但曩二合多靡尾止枳縒疑縛引虎股污嚕引肱也但曩竭涅哩二合荼重操娑佉引也佐跛哩左引羅迦弼禰嚩乾素播難基必隸